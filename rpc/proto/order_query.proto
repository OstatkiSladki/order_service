syntax = "proto3";

package ostatki.grpc.v1;

service OrderQueryService {
  rpc ValidateOrder(ValidateOrderRequest) returns (ValidateOrderResponse);
  rpc GetOrderById(GetOrderByIdRequest) returns (GetOrderByIdResponse);
  rpc GetOrderDetails(GetOrderDetailsRequest) returns (GetOrderDetailsResponse);
}

message ValidateOrderRequest {
  int64 order_id = 1;
  int64 user_id = 2;
}

message ValidateOrderResponse {
  bool is_valid = 1;
  string order_status = 2;
  string error_code = 3;
  string error_message = 4;
}

message GetOrderByIdRequest {
  int64 order_id = 1;
}

message OrderItem {
  int64 offer_id = 1;
  string product_name = 2;
  string price = 3;
  int32 quantity = 4;
  string subtotal = 5;
}

message GetOrderByIdResponse {
  int64 order_id = 1;
  int64 user_id = 2;
  int64 venue_id = 3;
  string amount = 4;
  string discount_amount = 5;
  string final_amount = 6;
  string currency = 7;
  string status = 8;
  repeated OrderItem items = 9;
}

message GetOrderDetailsRequest {
  int64 order_id = 1;
}

message GetOrderDetailsResponse {
  int64 order_id = 1;
  int64 user_id = 2;
  int64 venue_id = 3;
  string amount = 4;
  string discount_amount = 5;
  string final_amount = 6;
  string currency = 7;
  string status = 8;
  repeated OrderItem items = 9;
}
